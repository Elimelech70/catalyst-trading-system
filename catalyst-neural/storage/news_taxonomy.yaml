# =============================================================================
# CATALYST NEURAL — NEWS TAXONOMY (15 categories)
# =============================================================================
# Name of Application: Catalyst Trading System
# Name of file: news_taxonomy.yaml
# Version: 0.1.0
# Last Updated: 2026-05-23
# Purpose: Keyword sets for the 15-category news classifier (v0.4).
#          Used by storage/news_classifier_regex.py.
#
# Reference: Documentation/Design/catalyst-context-conditioned-architecture-v0.1.md
#            Section 3 (News taxonomy).
#
# Drawn in part from catalyst-international/config/news_context.yaml.
# REVISION HISTORY:
# v0.1.0 (2026-05-23) - Initial 15-category set, Boudoukh-aligned.
# =============================================================================

version: "0.1.0"

# How matching works:
#   priority: 1 = most specific (wins on tie), 5 = most generic (catch-all)
#   match_keywords: substring match against lowercased headline. A match counts 1.
#   boost_keywords: if present, multiply confidence by 1.5x for this category.
# Output: top 3 categories above confidence_threshold, ranked by score.

confidence_threshold: 0.30   # below this, leave as 'other' / NULL
# Score formula: (match_count + 0.5 * boost_count) / 3, capped at 1.0.
# So 1 unique match keyword = 0.33, 2 = 0.67, 3+ = 1.0.
# A boost-keyword hit adds 0.17 on top of its own match. Threshold 0.30 means
# at least one strong match keyword OR one match + one boost is required.

