# =============================================================================
# SENTIMENT THRESHOLDS
# =============================================================================
# Thresholds for interpreting sentiment scores.

thresholds:
  # Minimum sentiment to qualify as positive catalyst
  catalyst_minimum: 0.3
  
  # Sentiment score interpretations
  strong_positive: 0.5
  positive: 0.3
  neutral_upper: 0.1
  neutral_lower: -0.1
  negative: -0.3
  strong_negative: -0.5
  
  # Score dampening (prevents extreme scores)
  max_score: 0.9
  min_score: -0.9

# =============================================================================
# COMPOSITE SCORE WEIGHTS
# =============================================================================
# Weights for combining different factors into final score.

composite_weights:
  catalyst: 0.40    # News sentiment × catalyst multiplier (was 0.30)
  volume: 0.20      # Volume ratio vs average
  momentum: 0.15    # 5-day price change (was 0.20)
  technical: 0.25   # RSI, patterns (was 0.30)

