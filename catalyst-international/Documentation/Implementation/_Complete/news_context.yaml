# =============================================================================
# CATALYST TYPE CLASSIFICATION
# =============================================================================
# Different catalyst types have different typical price impacts.
# Multiplier adjusts the base sentiment score.

catalyst_types:
  # Tier 1: Binary outcomes - highest impact (5-15% typical move)
  binary_event:
    tier: 1
    name: "Binary Event"
    multiplier: 1.5
    typical_move: "5-15%"
    keywords:
      - approved
      - approval
      - approves
      - rejected
      - rejection
      - vote
      - voted
      - voting
      - ruling
      - verdict
      - decision
      - fda
      - regulatory
      - clearance
      - bond extension
      - debt extension
      - reprieve
      - restructuring approved
      - settlement
      - granted
      - denied
  
  # Tier 2: Corporate actions - high impact (3-10% typical move)
  corporate_action:
    tier: 2
    name: "Corporate Action"
    multiplier: 1.3
    typical_move: "3-10%"
    keywords:
      - buyback
      - repurchase
      - buy-back
      - ipo
      - listing
      - debut
      - raises
      - spinoff
      - spin-off
      - demerger
      - merger
      - acquisition
      - acquires
      - acquired
      - takeover
      - strategic review
      - strategic options
      - activist
      - stake
      - privatization
  
  # Tier 3: Policy/regulatory - medium-high impact (2-5% typical move)
  policy:
    tier: 3
    name: "Policy/Regulatory"
    multiplier: 1.2
    typical_move: "2-5%"
    keywords:
      - subsidy
      - subsidies
      - subsidized
      - stimulus
      - incentive
      - incentives
      - tariff
      - tariffs
      - trade war
      - regulation
      - deregulation
      - tax
      - taxation
      - government support
      - policy support
      - sanctions
      - ban
      - restriction
  
  # Tier 4: Analyst actions - medium impact (1-3% typical move)
  analyst:
    tier: 4
    name: "Analyst Action"
    multiplier: 1.0
    typical_move: "1-3%"
    keywords:
      - upgrade
      - upgraded
      - upgrades
      - downgrade
      - downgraded
      - price target
      - target raised
      - target cut
      - overweight
      - underweight
      - outperform
      - underperform
      - initiates
      - initiated
      - coverage
      - buy rating
      - sell rating
      - hold rating
  
  # Tier 5: General news - lower impact (0.5-2% typical move)
  general:
    tier: 5
    name: "General News"
    multiplier: 0.8
    typical_move: "0.5-2%"
    keywords:
      - partnership
      - collaboration
      - agreement
      - contract
      - deal
      - order
      - expansion
      - launch
      - launches
      - milestone
      - achievement
      - record
      - revenue
      - profit
      - earnings

